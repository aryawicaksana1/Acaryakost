<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Google Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <script>
        // Init Theme
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        
        // Sinkronisasi tema antar tab
        window.addEventListener('storage', (e) => {
            if (e.key === 'theme') {
                if (e.newValue === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }
        });
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(107, 33, 168, 0.1), 0 4px 6px -2px rgba(107, 33, 168, 0.05); }
        .search-focus:focus-within { ring: 2px solid #9333ea; border-color: #9333ea; box-shadow: 0 0 0 2px rgba(147, 51, 234, 0.1); }
        .form-gradient { background: linear-gradient(135deg, #7e22ce, #a855f7); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen flex flex-col text-slate-800 dark:text-slate-100 transition-colors duration-300">

    <!-- Hero Section / Header -->
    <header class="bg-slate-50 dark:bg-slate-900 border-b border-purple-100 dark:border-slate-800 relative sticky top-0 z-30 shadow-sm transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center text-purple-600">
                        <i class="fas fa-file-signature text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-slate-800 dark:text-white">Portal Formulir</h1>
                        <p class="text-xs text-purple-600 dark:text-purple-400 font-medium">Pusat Akses Google Forms</p>
                    </div>
                </div>
                
                <!-- Search Bar -->
                <div class="w-full md:w-96 relative search-focus rounded-lg group">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-search text-slate-400 group-focus-within:text-purple-500"></i>
                    </div>
                    <input type="text" id="search-input" onkeyup="filterResources()" 
                        class="block w-full pl-10 pr-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg leading-5 bg-slate-50 dark:bg-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:bg-white dark:focus:bg-slate-700 transition duration-150 ease-in-out sm:text-sm"
                        placeholder="Cari form pendaftaran, pembayaran...">
                </div>
            </div>
        </div>
    </header>

    <!-- Main Grid Content -->
    <main class="flex-1 max-w-7xl mx-auto w-full p-4 sm:p-6 lg:p-8">
        
        <!-- Filter Categories -->
        <div class="flex flex-wrap gap-2 mb-8 justify-center md:justify-start">
            <button onclick="filterType('all')" class="filter-btn active px-4 py-1.5 rounded-full text-sm font-medium bg-purple-600 text-white shadow-sm hover:bg-purple-700 transition dark:border-transparent">Semua</button>
            <button onclick="filterType('pendaftaran')" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-700 hover:bg-purple-50 dark:hover:bg-slate-700 hover:text-purple-600 dark:hover:text-purple-400 transition">Pendaftaran</button>
            <button onclick="filterType('survei')" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-700 hover:bg-purple-50 dark:hover:bg-slate-700 hover:text-purple-600 dark:hover:text-purple-400 transition">Survei</button>
            <button onclick="filterType('pembayaran')" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-700 hover:bg-purple-50 dark:hover:bg-slate-700 hover:text-purple-600 dark:hover:text-purple-400 transition">Pembayaran</button>
        </div>

        <!-- Grid Container -->
        <div id="resource-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Cards will be injected here via JavaScript -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-12 text-center">
            <div class="w-16 h-16 bg-purple-50 rounded-full flex items-center justify-center mb-4">
                <i class="fas fa-clipboard-question text-purple-300 text-2xl"></i>
            </div>
            <h3 class="text-lg font-medium text-slate-900 dark:text-white">Form tidak ditemukan</h3>
            <p class="text-slate-500 dark:text-slate-400">Coba kata kunci pencarian lain.</p>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-white dark:bg-slate-900 border-t border-purple-100 dark:border-slate-800 mt-auto transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 py-6 text-center text-sm text-slate-500 dark:text-slate-400">
            &copy; 2024 Portal Formulir Digital.
        </div>
    </footer>

    <script>
        // ==========================================
        // DATA GOOGLE FORM (SILAKAN EDIT DI SINI)
        // ==========================================
        const resources = [
            {
                title: "Anggota Baru Acarya kost 1",
                description: "Formulir registrasi untuk penghuni kost Acarya 1 baru. ",
                url: "https://forms.gle/MbR7Ez8mWibhuz829",
                type: "pendaftaran", // pendaftaran, survei, pembayaran
                status: "open", // open, closed
                deadline: "Unlimited"
            },
            {
                title: "Anggota Baru Acarya kost 2",
                description: "Formulir registrasi untuk penghuni kost acarya 2 baru.",
                url: "https://forms.gle/6Laxi294ao7jD1k17",
                type: "pendaftaran", // pendaftaran, survei, pembayaran
                status: "open", // open, closed
                deadline: "Unlimited"
            },
            {
                title: "Survei Kepuasan Kost Acarya 2",
                description: "Masukan dan saran kost acarya 2 untuk perkembangan kost.",
                url: "https://forms.gle/4D9i9wdYif8kboes5",
                type: "survei",
                status: "open",
                deadline: "Unlimited"
            },
            {
                title: "Konfirmasi Pembayaran kost",
                description: "Upload bukti transfer pembayaran disini.",
                url: "https://forms.gle/gRqwjdahzj7qXJ1a6",
                type: "pembayaran",
                status: "open",
                deadline: "10 Feb 2024"
            },
            {
                title: "RSVP Gathering Kantor",
                description: "Konfirmasi kehadiran untuk acara makan malam tahunan.",
                url: "https://docs.google.com/forms/d/e/example4/viewform",
                type: "pendaftaran",
                status: "open",
                deadline: "20 Des 2024"
            },
            {
                title: "Survei Kepuasan kost acarya 1",
                description: "Masukan dan saran kost acarya 1 untuk perkembangan kost.",
                url: "https://forms.gle/haJuHfTcyrDhciyA7",
                type: "survei",
                status: "open",
                deadline: "Unlimited"
            },
            {
                title: "Formulir Refund / Pengembalian",
                description: "Pengajuan pengembalian dana untuk barang yang rusak.",
                url: "https://docs.google.com/forms/d/e/example6/viewform",
                type: "pembayaran",
                status: "closed",
                deadline: "01 Jan 2024"
            }
        ];
        // ==========================================

        let currentFilter = 'all';

        function getIcon(type) {
            switch(type) {
                case 'pendaftaran': return '<i class="fas fa-user-plus text-purple-600 text-3xl"></i>';
                case 'survei': return '<i class="fas fa-poll text-blue-500 text-3xl"></i>';
                case 'pembayaran': return '<i class="fas fa-money-bill-wave text-emerald-500 text-3xl"></i>';
                default: return '<i class="fas fa-clipboard-list text-gray-400 text-3xl"></i>';
            }
        }

        function getButtonText(status) {
            return status === 'closed' ? 'Form Ditutup' : 'Isi Form';
        }

        function renderResources(items) {
            const grid = document.getElementById('resource-grid');
            const emptyState = document.getElementById('empty-state');
            
            grid.innerHTML = '';
            
            if (items.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }
            
            grid.classList.remove('hidden');
            emptyState.classList.add('hidden');

            items.forEach(item => {
                const isClosed = item.status === 'closed';
                const card = document.createElement('div');
                card.className = `bg-white dark:bg-slate-800 rounded-xl shadow-sm border p-5 flex flex-col h-full relative overflow-hidden group ${isClosed ? 'border-gray-100 dark:border-slate-700 opacity-70 grayscale-[0.5]' : 'border-purple-100 dark:border-slate-700 card-hover'}`;
                
                card.innerHTML = `
                    <div class="absolute top-0 right-0 p-4 opacity-5 group-hover:opacity-10 transition-opacity">
                         <i class="fas fa-file-signature text-6xl text-purple-800"></i>
                    </div>
                    
                    <div class="flex items-start justify-between mb-4 z-10">
                        <div class="bg-purple-50 dark:bg-slate-700 p-3 rounded-lg shadow-sm">
                            ${getIcon(item.type)}
                        </div>
                        <span class="text-[10px] font-bold ${isClosed ? 'text-red-500 bg-red-50 dark:bg-red-500/10' : 'text-green-600 bg-green-50 dark:bg-green-500/10'} px-2 py-1 rounded-full uppercase tracking-wide border ${isClosed ? 'border-red-100 dark:border-red-500/20' : 'border-green-100 dark:border-green-500/20'}">
                            ${isClosed ? 'Ditutup' : 'Aktif'}
                        </span>
                    </div>
                    
                    <div class="flex-1 z-10">
                        <h3 class="text-lg font-bold text-slate-800 dark:text-white mb-2 leading-tight ${isClosed ? 'text-slate-500 dark:text-slate-400' : ''}">${item.title}</h3>
                        <p class="text-sm text-slate-500 dark:text-slate-300 mb-4 line-clamp-2">${item.description}</p>
                    </div>

                    <div class="mt-auto pt-4 border-t border-slate-100 dark:border-slate-700 z-10">
                        <div class="flex items-center justify-between mb-3 text-xs text-slate-400 dark:text-slate-500">
                            <span><i class="far fa-clock mr-1"></i> Deadline:</span>
                            <span class="font-medium text-slate-600 dark:text-slate-300">${item.deadline}</span>
                        </div>
                        
                        ${isClosed ? 
                            `<button disabled class="w-full bg-gray-100 dark:bg-slate-700 text-gray-400 dark:text-slate-500 text-sm font-medium py-2 px-4 rounded-lg cursor-not-allowed text-center">
                                <i class="fas fa-lock mr-2"></i> Form Ditutup
                            </button>` :
                            `<a href="${item.url}" target="_blank" class="block w-full text-center bg-purple-600 hover:bg-purple-700 text-white text-sm font-medium py-2 px-4 rounded-lg transition-colors shadow-sm hover:shadow-md">
                                Isi Formulir <i class="fas fa-arrow-right ml-2 text-xs"></i>
                            </a>`
                        }
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterResources() {
            const searchInput = document.getElementById('search-input').value.toLowerCase();
            
            const filtered = resources.filter(item => {
                const matchesSearch = item.title.toLowerCase().includes(searchInput) || item.description.toLowerCase().includes(searchInput);
                const matchesType = currentFilter === 'all' || item.type === currentFilter;
                return matchesSearch && matchesType;
            });
            
            renderResources(filtered);
        }

        function filterType(type) {
            currentFilter = type;
            
            // Update button styles
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                if(btn.innerText.toLowerCase().includes(type === 'all' ? 'semua' : type)) {
                    // Active state
                    btn.classList.remove('bg-white', 'dark:bg-slate-800', 'text-slate-600', 'dark:text-slate-300', 'border-slate-200', 'dark:border-slate-700');
                    btn.classList.add('bg-purple-600', 'text-white', 'border-transparent', 'dark:border-transparent');
                } else {
                    // Inactive state
                    btn.classList.add('bg-white', 'dark:bg-slate-800', 'text-slate-600', 'dark:text-slate-300', 'border-slate-200', 'dark:border-slate-700');
                    btn.classList.remove('bg-purple-600', 'text-white', 'border-transparent', 'dark:border-transparent');
                }
            });

            filterResources();
        }

        // Initial Render
        renderResources(resources);
    </script>
</body>
</html>
